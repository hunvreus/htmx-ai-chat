<article class="flex justify-end">
  <p class="max-w-[80%] rounded-xl bg-neutral-100 px-3 py-2 text-sm whitespace-pre-wrap dark:bg-neutral-800">{{ user_message }}</p>
</article>
<article class="flex justify-start">
  <p
    id="msg-{{ assistant_id }}"
    data-markdown="assistant"
    class="max-w-[80%] px-1 py-2 text-sm text-neutral-500 dark:text-neutral-400 animate-pulse whitespace-pre-wrap leading-6 [&_code]:rounded [&_code]:bg-neutral-100 [&_code]:px-1 [&_code]:py-0.5 dark:[&_code]:bg-neutral-800"
    hx-ext="sse"
    sse-connect="{{ stream_url }}"
    sse-swap="delta"
    sse-close="done"
  >
    Thinking...
  </p>
</article>
