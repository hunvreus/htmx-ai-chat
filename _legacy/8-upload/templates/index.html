<!doctype html>
<html lang="en">
  <head>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('themeMode');
          if (stored ? stored === 'dark'
                     : matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}

        const apply = dark => {
          document.documentElement.classList.toggle('dark', dark);
          try { localStorage.setItem('themeMode', dark ? 'dark' : 'light'); } catch (_) {}
        };

        document.addEventListener('basecoat:theme', (event) => {
          const mode = event.detail?.mode;
          apply(mode === 'dark' ? true
               : mode === 'light' ? false
               : !document.documentElement.classList.contains('dark'));
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step 8: Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  </head>
  <body class="h-screen">
    {% if threads %}
      {% include 'partials/sidebar.html' %}
    {% endif %}

    <main class="flex h-screen flex-col">
      {% if thread_id %}
      {% include 'partials/content_thread.html' %}
      {% else %}
      {% include 'partials/content_new_thread.html' %}
      {% endif %}
    </main>

    <script>
      function setButtonState(disabled) {
        const button = document.querySelector("#chat-form button[type='submit']");
        if (button) button.disabled = disabled;
      }

      function scrollChatToBottom() {
        const chat = document.getElementById("chat");
        if (!chat) return;
        chat.scrollTop = chat.scrollHeight;
      }

      function bindComposer() {
        const form = document.getElementById("chat-form");
        const textarea = document.getElementById("message");
        if (!form || !textarea || textarea.dataset.bound === "1") return;

        textarea.dataset.bound = "1";
        textarea.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            form.requestSubmit();
          }
        });
      }

      function updateCurrentLinks() {
        const sidebar = document.getElementById("sidebar");
        if (!sidebar) return;
        const currentPath = window.location.pathname.replace(/\/$/, "");
        const currentSearch = window.location.search;
        const currentKey = `${currentPath}${currentSearch}`;

        sidebar.querySelectorAll("a, button").forEach((item) => {
          const href = item.getAttribute("href");
          if (!href) {
            item.removeAttribute("aria-current");
            return;
          }

          const url = new URL(href, window.location.origin);
          const itemPath = url.pathname.replace(/\/$/, "");
          const itemKey = `${itemPath}${url.search}`;

          if (itemKey === currentKey) {
            item.setAttribute("aria-current", "page");
          } else {
            item.removeAttribute("aria-current");
          }
        });
      }

      document.body.addEventListener("htmx:beforeRequest", (event) => {
        if (event.target?.id !== "chat-form") return;
        setButtonState(true);
        const textarea = document.getElementById("message");
        if (!textarea) return;
        textarea.value = "";
        textarea.focus();
      });

      document.body.addEventListener("htmx:sseMessage", (event) => {
        const target = event.detail.elt;
        if (target) target.classList.remove("animate-pulse", "text-neutral-500", "dark:text-neutral-400");
        scrollChatToBottom();
      });

      document.body.addEventListener("htmx:sseClose", () => setButtonState(false));
      document.body.addEventListener("htmx:sseError", () => setButtonState(false));

      document.body.addEventListener("htmx:afterSwap", () => {
        bindComposer();
        scrollChatToBottom();
        updateCurrentLinks();
      });

      window.addEventListener("popstate", updateCurrentLinks);
      document.addEventListener("DOMContentLoaded", () => {
        bindComposer();
        scrollChatToBottom();
        updateCurrentLinks();
      });
    </script>
  </body>
</html>
