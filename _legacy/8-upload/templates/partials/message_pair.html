{% if user_message or attachment_b64 %}
<article class="flex justify-end">
  <div class="max-w-[80%]">
    {% if user_message %}
    <p class="rounded-xl bg-neutral-100 px-3 py-2 text-sm whitespace-pre-wrap dark:bg-neutral-800">{{ user_message }}</p>
    {% endif %}
    {% if attachment_b64 %}
    <div class="mt-2 rounded-xl bg-neutral-100 px-3 py-2 text-sm dark:bg-neutral-800">
      {% if attachment_mime and attachment_mime.startswith('image/') %}
      <img class="max-h-72 rounded-md" src="data:{{ attachment_mime }};base64,{{ attachment_b64 }}" alt="{{ attachment_name or 'attachment' }}" />
      {% else %}
      <p>{{ attachment_name or 'Attachment' }}</p>
      {% endif %}
    </div>
    {% endif %}
  </div>
</article>
{% endif %}
<article class="flex justify-start">
  <p
    id="msg-{{ assistant_id }}"
    class="max-w-[80%] px-1 py-2 text-sm text-neutral-500 dark:text-neutral-400 animate-pulse whitespace-pre-wrap"
    hx-ext="sse"
    sse-connect="{{ stream_url }}"
    sse-swap="delta"
    sse-close="done"
  >
    Thinking...
  </p>
</article>
