<article class="flex justify-end">
  <p class="max-w-[80%] rounded-xl px-3 py-2 text-sm whitespace-pre-wrap bg-neutral-100 dark:bg-neutral-900">{{ user_message }}</p>
</article>
<article class="flex justify-start">
  <p
    id="msg-{{ assistant_id }}"
    class="max-w-[80%] px-1 py-2 text-sm text-neutral-500 dark:text-neutral-400 animate-pulse whitespace-pre-wrap"
    hx-ext="sse"
    sse-connect="{{ stream_url }}"
    sse-swap="delta"
    sse-close="done"
  >Thinking...</p>
</article>
