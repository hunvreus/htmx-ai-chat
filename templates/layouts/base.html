<!doctype html>
<html>
<head>
  <!-- Theme -->
  <script>
  function isDark() {
    return localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }

  if (isDark()) {
    document.documentElement.classList.add('dark');
  }

  document.addEventListener('alpine:init', () => {
    Alpine.store('theme', {
      isDark: isDark(),
      toggle() {
        this.isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
      }
    });
  });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <meta charset="utf-8"/>
  <meta http-equiv="Content-Language" content="en"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <!-- Title & Description -->
  <title>
    {% block title %}
    {% if title %}{{ title }} | {{ config.APP_NAME }}{% else %}{{ config.APP_NAME }}{% endif %}
    {% endblock %}
  </title>
  <meta name="title" content="{% if title %}{{ title }} | {{ config.APP_NAME }}{% else %}{{ config.APP_NAME }}{% endif %}">
  <meta name="description" content="{{ description or config.APP_DESCRIPTION }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:title" content="{% if title %}{{ title }} | {{ config.APP_NAME }}{% else %}{{ config.APP_NAME }}{% endif %}">
  <meta property="og:description" content="{{ description or config.APP_DESCRIPTION }}">
  <meta property="og:image" content="{{ url_for('static', path='social.png') }}">
  <meta property="og:site_name" content="{{ config.APP_NAME }}">

  <!-- X/Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{ request.url }}">
  <meta name="twitter:title" content="{% if title %}{{ title }} | {{ config.APP_NAME }}{% else %}{{ config.APP_NAME }}{% endif %}">
  <meta name="twitter:description" content="{{ description or config.APP_DESCRIPTION }}">
  <meta name="twitter:image" content="{{ url_for('static', path='social.png') }}">
  <meta name="twitter:creator" content="@hunvreus">
  <meta property="og:locale" content="en_US">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='apple-touch-icon.png') }}" />

  <!-- Tailwind + Basecoat -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.2.8/dist/basecoat.cdn.min.css">
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.2.8/dist/js/all.min.js" defer></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.3" integrity="sha384-Y4gc0CK6Kg+hmulDc6rZPJu0tqvk7EWlih0Oh+2OkAi1ZDlCbBDCQEE2uVk472Ky" crossorigin="anonymous"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="relative h-full text-sm">
  {% block content %}{% endblock %}

  {% from 'macros/toast.html' import toaster %}
</body>
</html>
